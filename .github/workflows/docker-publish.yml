name: Build and push images

on:
  push:
    branches: [main]
    paths:
      - 'apps/acme/**'
      - 'apps/ddns/**'
      - 'config/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-docker:
    name: Docker (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        app: [acme, ddns]
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            acme:
              - 'apps/acme/**'
            ddns:
              - 'apps/ddns/**'
              - 'config/**'
            workflow:
              - '.github/workflows/docker-publish.yml'

      - name: Decide if this app should build
        id: should
        run: |
          APP="${{ matrix.app }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.workflow }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$APP" = "acme" ] && [ "${{ steps.filter.outputs.acme }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          elif [ "$APP" = "ddns" ] && [ "${{ steps.filter.outputs.ddns }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${APP}: no relevant path changes"
          fi

      - name: Log in to GHCR
        if: steps.should.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        if: steps.should.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Set up QEMU
        if: steps.should.outputs.build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.should.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        if: steps.should.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APPNAME=${{ matrix.app }}
            APPVERSION=${{ github.sha }}

  build-darwin:
    name: Darwin binary (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        app: [acme, ddns]
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            acme:
              - 'apps/acme/**'
            ddns:
              - 'apps/ddns/**'
              - 'config/**'
            workflow:
              - '.github/workflows/docker-publish.yml'

      - name: Decide if this app should build
        id: should
        run: |
          APP="${{ matrix.app }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.workflow }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$APP" = "acme" ] && [ "${{ steps.filter.outputs.acme }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          elif [ "$APP" = "ddns" ] && [ "${{ steps.filter.outputs.ddns }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${APP}: no relevant path changes"
          fi

      - name: Set up Go
        if: steps.should.outputs.build == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/${{ matrix.app }}/go.mod
          cache-dependency-path: apps/${{ matrix.app }}/go.sum

      - name: Build darwin/arm64 binary
        if: steps.should.outputs.build == 'true'
        working-directory: apps/${{ matrix.app }}
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -o "${{ matrix.app }}-darwin-arm64" ./cmd/main.go

      - name: Upload darwin/arm64 binary
        if: steps.should.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-darwin-arm64
          path: apps/${{ matrix.app }}/${{ matrix.app }}-darwin-arm64
          if-no-files-found: error
