name: Build and push images

on:
  push:
    tags:
      - 'ddns-v*'
      - 'acme-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a construir (ej. ddns-v0.1 o acme-v0.2)'
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build-docker:
    name: Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          APP="${TAG%%-*}"       # ddns-v0.1 -> ddns
          VERSION="${TAG#*-}"    # ddns-v0.1 -> v0.1
          if [ "$APP" != "ddns" ] && [ "$APP" != "acme" ]; then
            echo "Tag '$TAG' no corresponde a una app valida (ddns|acme)"; exit 1
          fi
          if [ "$VERSION" = "$TAG" ] || [ -z "$VERSION" ]; then
            echo "Tag '$TAG' no tiene el formato <app>-v<version>"; exit 1
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ steps.parse.outputs.app }}
          file: apps/${{ steps.parse.outputs.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ steps.parse.outputs.app }}:${{ steps.parse.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ steps.parse.outputs.app }}:latest
          build-args: |
            APPNAME=${{ steps.parse.outputs.app }}
            APPVERSION=${{ steps.parse.outputs.version }}

  build-darwin:
    name: Darwin binary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          APP="${TAG%%-*}"
          VERSION="${TAG#*-}"
          if [ "$APP" != "ddns" ] && [ "$APP" != "acme" ]; then
            echo "Tag '$TAG' no corresponde a una app valida (ddns|acme)"; exit 1
          fi
          if [ "$VERSION" = "$TAG" ] || [ -z "$VERSION" ]; then
            echo "Tag '$TAG' no tiene el formato <app>-v<version>"; exit 1
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/${{ steps.parse.outputs.app }}/go.mod
          cache-dependency-path: apps/${{ steps.parse.outputs.app }}/go.sum

      - name: Build darwin/arm64 binary
        working-directory: apps/${{ steps.parse.outputs.app }}
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -o "${{ steps.parse.outputs.app }}-darwin-arm64" ./cmd/main.go

      - name: Upload darwin/arm64 binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.parse.outputs.app }}-${{ steps.parse.outputs.version }}-darwin-arm64
          path: apps/${{ steps.parse.outputs.app }}/${{ steps.parse.outputs.app }}-darwin-arm64
          if-no-files-found: error
