name: Build and push images

on:
  push:
    branches: [main]
    paths:
      - 'apps/acme/**'
      - 'apps/ddns/**'
      - 'config/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        app: [acme, ddns]
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            acme:
              - 'apps/acme/**'
            ddns:
              - 'apps/ddns/**'
              - 'config/**'
            workflow:
              - '.github/workflows/docker-publish.yml'

      - name: Decide if this app should build
        id: should
        run: |
          APP="${{ matrix.app }}"
          # Rebuild all apps when this workflow file changes (or manual run).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.workflow }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$APP" = "acme" ] && [ "${{ steps.filter.outputs.acme }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          elif [ "$APP" = "ddns" ] && [ "${{ steps.filter.outputs.ddns }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${APP}: no relevant path changes"
          fi

      - name: Log in to GHCR
        if: steps.should.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        if: steps.should.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        if: steps.should.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.should.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GOOS=linux
            GOARCH=amd64
            APPNAME=${{ matrix.app }}
            APPVERSION=${{ github.sha }}
